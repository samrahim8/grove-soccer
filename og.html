<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Hamlin Cup · OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Inter:wght@400;500;600&family=Damion&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15301f;
    --bg-elev:#1f3a2b;
    --ink:#f3ead4;
    --ink-mid:#e0d4b2;
    --ink-soft:#a89c7e;
    --accent:#e26a1f;
    --lemon:#d4a017;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{margin:0;padding:0;background:#000}

  /* the OG canvas — exactly 1200x630 */
  .og{
    width:1200px;height:630px;
    background:var(--bg);color:var(--ink);
    font-family:'Inter',sans-serif;
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;
  }
  /* paper grain */
  .og::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95 0 0 0 0 0.9 0 0 0 0 0.78 0 0 0 0.5 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
    mix-blend-mode:overlay;opacity:.25;
  }
  /* fine grid */
  .og::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:4;
    background-image:
      linear-gradient(to right, rgba(243,234,212,.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(243,234,212,.05) 1px, transparent 1px);
    background-size:20px 20px;
  }

  /* top ribbon */
  .ribbon{
    height:14px;width:100%;flex:0 0 14px;position:relative;z-index:6;
    background-image:linear-gradient(to bottom,
      var(--accent) 0 4px,
      var(--bg) 4px 6px,
      var(--lemon) 6px 8px,
      var(--bg) 8px 10px,
      var(--accent) 10px 14px
    );
  }

  /* body — 2 col */
  .body{
    flex:1;display:grid;
    grid-template-columns:1fr 460px;
    gap:48px;align-items:center;
    padding:48px 64px 56px;position:relative;z-index:6;
  }

  /* LEFT: text column */
  .text{display:flex;flex-direction:column;justify-content:center}

  .presents{
    font-family:'Syne',sans-serif;font-weight:700;
    font-size:14px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--ink-soft);margin-bottom:24px;
  }
  .presents .dot{color:var(--accent);margin:0 .35em}

  h1{
    font-family:'Syne',sans-serif;font-weight:800;
    font-size:118px;line-height:.9;letter-spacing:-.035em;
    color:var(--ink);margin:0;
  }
  .hairline{
    width:96px;height:4px;background:var(--lemon);
    margin:28px 0 24px;
  }
  .meta{
    font-family:'Syne',sans-serif;font-weight:700;
    font-size:18px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--ink);margin-bottom:28px;
  }
  .meta .dot{color:var(--accent);margin:0 .4em}
  .meta .lemon{color:var(--lemon)}
  .cta-line{
    font-family:'Damion',cursive;font-weight:400;
    font-size:42px;color:var(--accent);line-height:1;
  }

  /* RIGHT: mark column */
  .mark-col{
    display:flex;align-items:center;justify-content:center;
    height:100%;
  }
  .mark-col img{
    width:100%;height:auto;display:block;
    max-width:460px;
  }

  /* bottom URL strip */
  .foot{
    position:absolute;left:64px;bottom:24px;z-index:7;
    font-family:'Syne',sans-serif;font-weight:700;
    font-size:13px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--ink-soft);
  }
  .foot .o{color:var(--accent);margin:0 .5em}

  /* tiny "lot" stamp top-right corner detail */
  .lot{
    position:absolute;right:64px;top:32px;z-index:7;
    font-family:'Syne',sans-serif;font-weight:700;
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--ink-soft);text-align:right;line-height:1.7;
  }
  .lot b{color:var(--ink);font-weight:700}
</style>
</head>
<body>

<div class="og">
  <div class="ribbon"></div>

  <div class="body">
    <div class="text">
      <div class="presents">Grove Soccer Co. <span class="dot">·</span> Presents</div>
      <h1>The Hamlin<br/>Cup.</h1>
      <div class="hairline"></div>
      <div class="meta">Fall 2026 <span class="dot">·</span> <span class="lemon">Horizon West, FL</span></div>
      <div class="cta-line">Grab your squad.</div>
    </div>
    <div class="mark-col">
      <img src="grove-mark.png" alt="" />
    </div>
  </div>

  <div class="foot">grove.soccer <span class="o">·</span> 6 v 6 <span class="o">·</span> Adult Tournament</div>
</div>

</body>
</html>
